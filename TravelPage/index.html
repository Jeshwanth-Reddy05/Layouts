<!DOCTYPE html>
<html>
<head>
    <title>Travel Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

   
    <div class="hero">
        <h1>Travel With Us</h1>
        <button>Discover</button>
    </div>

   
    <div class="section activity">
        <div class="left">
            <h2>Outdoor Activity</h2>
            <p>
                Explore nature and enjoy beautiful places with us.
                Adventure and fun guaranteed.
            </p>
        </div>

        <div class="right">
            <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" alt="Outdoor">
        </div>
    </div>


    <div class="section tourism">
        <h2>Types of Tourism</h2>

        <div class="cards">
            <div class="card">
                <img src="https://img.icons8.com/color/96/trekking.png">
                <p>Hiking</p>
            </div>

            <div class="card">
                <img src="https://img.icons8.com/color/96/rafting.png">
                <p>Rafting</p>
            </div>

            <div class="card">
                <img src="https://thumbs.dreamstime.com/z/cartoon-hiker-boy-20473074.jpg">
                <p>Water</p>
            </div>

            <div class="card">
                <img src="https://img.icons8.com/color/96/camping-tent.png">
                <p>Camping</p>
            </div>
        </div>
    </div>


    <div class="section choose">
        <h2>Choose What Suits You</h2>
        <div class="tabs">
            <span class="active">Hiking</span>
            <span>Rafting</span>
            <span>Camping</span>
            <span>Other</span>
        </div>
    </div>

</body>
</html>
